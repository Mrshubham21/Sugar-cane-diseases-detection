<!DOCTYPE html>
<html>

<head>
    <title>Result</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            background: #00ff88;
            filter: blur(150px);
            opacity: 0.12;
            top: -100px;
            left: -100px;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            margin: 20px auto;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
        }

        .result-img {
            width: 240px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 2px solid rgba(255,255,255,0.08);
        }

        .result-class {
            font-size: 32px;
            color: #00ff88;
            font-weight: 700;
            margin-top: 10px;
        }

        .confidence-title {
            margin-top: 15px;
            color: #bbb;
        }

        .bar {
            width: 80%;
            margin: 15px auto;
            height: 14px;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .fill {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 1s ease, background 0.5s ease;
        }

        #confText {
            font-size: 18px;
            margin-top: 10px;
            line-height: 1.7;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            margin: 8px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .primary {
            background: #00ff88;
            color: black;
        }

        .outline {
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .outline:hover {
            background: rgba(0,255,136,0.08);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .card {
            background: #111;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .status {
            font-size: 16px;
            font-weight: 600;
        }

        @media(max-width: 600px) {
            .result-img {
                width: 180px;
            }

            .result-class {
                font-size: 26px;
            }

            .bar {
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <main class="container">

        <h1>🔬 AI Prediction Result</h1>

        <!-- RESULT CARD -->
        <div class="glass">

            <!-- IMAGE -->
            <img src="{{ image_data }}" class="result-img">

            <!-- CLASS -->
            <div class="result-class">
                {{ classname }}
            </div>

            <!-- CONFIDENCE -->
            <p class="confidence-title">Confidence Meter</p>

            <div class="bar">
                <div id="fill" class="fill"></div>
            </div>

            <p id="confText"></p>

            <!-- ACTIONS -->
            <div>
                <a href="/" class="btn outline">
                    ⬅ Try Again
                </a>

                <a href="/dashboard" class="btn outline">
                    📊 Dashboard
                </a>

                <button onclick="window.print()" class="btn primary">
                    🖨 Print
                </button>
            </div>

        </div>

        <!-- SMART ADVISORY -->
        <div class="glass">

            <h2>🌿 Smart Advisory</h2>

            <div class="grid">

                <div class="card">
                    <h3>🩺 Treatment</h3>
                    <p>
                        {{ info.treatment if info is defined else 'N/A' }}
                    </p>
                </div>

                <div class="card">
                    <h3>🛡 Prevention</h3>
                    <p>
                        {{ info.prevention if info is defined else 'N/A' }}
                    </p>
                </div>

                <div class="card">
                    <h3>🧪 Fertilizer</h3>
                    <p>
                        {{ info.fertilizer if info is defined else 'N/A' }}
                    </p>
                </div>

            </div>

        </div>

    </main>

    <script>

        // confidence from flask
        let conf = parseFloat("{{ confidence }}");

        if (!isFinite(conf)) {
            conf = 0;
        }

        let percent = Math.round(conf);

        const fill = document.getElementById("fill");
        const confText = document.getElementById("confText");

        // set width
        fill.style.width = percent + "%";

        // confidence level
        let status = "";
        let color = "";

        if (percent >= 80) {

            status = "✅ High Confidence";
            color = "#00ff88";

        }
        else if (percent >= 50) {

            status = "⚠ Medium Confidence";
            color = "#ffcc00";

        }
        else {

            status = "❌ Low Confidence";
            color = "#ff4444";

        }

        // set bar color
        fill.style.background = color;

        // text output
        confText.innerHTML =
            `
            <strong>${percent}% confidence</strong>
            <br>
            <span class="status" style="color:${color}">
                ${status}
            </span>
            `;

    </script>

</body>

</html>
